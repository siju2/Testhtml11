<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>소리길 3D Navigation - Google Maps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 9:16 Mobile Container */
        .app-container {
            position: relative;
            height: 95vh;
            aspect-ratio: 9 / 16;
            background-color: #020617;
            overflow: hidden;
            border-radius: 44px;
            box-shadow: 0 0 0 10px #1e293b, 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            border: 2.5px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            transition: opacity 0.5s ease;
        }

        /* CSS to hide Google Maps error overlays if API key is invalid */
        .auth-error #map {
            display: none !important; /* Hide the map div entirely to remove the Google error window */
        }

        /* Simulation Grid Fallback */
        .grid-fallback {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.2) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.2) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            transform: perspective(1000px) rotateX(65deg);
            transform-origin: center;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .auth-error .grid-fallback {
            opacity: 1;
            animation: grid-flow 15s linear infinite;
        }

        @keyframes grid-flow {
            0% { transform: perspective(1000px) rotateX(65deg) translateY(0); }
            100% { transform: perspective(1000px) rotateX(65deg) translateY(600px); }
        }

        .glass-panel {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .pulse-gold {
            animation: pulse-gold 2.5s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); transform: scale(0.95); }
            70% { box-shadow: 0 0 0 20px rgba(234, 179, 8, 0); transform: scale(1); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); transform: scale(0.95); }
        }

        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .wave-bar {
            width: 3.5px;
            background: #ef4444;
            border-radius: 4px;
            animation: wave 0.6s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 6px; }
            50% { height: 24px; }
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.6), transparent);
            z-index: 2;
            animation: scan-loop 7s ease-in-out infinite;
        }
        @keyframes scan-loop {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- Map Layer -->
        <div id="map"></div>
        <!-- Simulation Background Layer (visible when map fails) -->
        <div class="grid-fallback"></div>
        <div class="scanner-line"></div>

        <!-- UI Overlay -->
        <div class="relative z-10 flex flex-col h-full px-6 pointer-events-none" style="padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);">
            
            <!-- Top Status Section -->
            <div class="mt-6 flex flex-col items-center gap-4 pointer-events-auto">
                <div class="flex items-center gap-2">
                    <span class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded tracking-tighter uppercase">3D Engine</span>
                    <h1 class="text-xl font-black italic tracking-tighter text-white">소리길 NAVI</h1>
                </div>
                
                <div class="glass-panel w-full p-4 rounded-3xl flex justify-between items-center shadow-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_12px_#22c55e]"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Current Location</span>
                            <span class="text-sm font-bold tracking-tight">특별시 S 서점 앞</span>
                        </div>
                    </div>
                    <div class="bg-white/10 p-2.5 rounded-2xl border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-white/80"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>

            <!-- Spatial Interaction Layer -->
            <div class="flex-grow relative">
                
                <!-- Destination: Library -->
                <div class="absolute top-[12%] left-1/2 -translate-x-1/2 flex flex-col items-center floating">
                    <div class="text-center mb-4 glass-panel p-4 rounded-[2rem] border-yellow-500/40 min-w-[140px] shadow-[0_0_30px_rgba(234,179,8,0.1)]">
                        <p class="text-yellow-400 font-black text-xl italic tracking-tighter">도서관</p>
                        <p class="text-white/90 text-[10px] font-bold mt-1">2시 방향 탐지</p>
                        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/20 to-transparent my-2.5"></div>
                        <p class="text-white/40 text-[9px] font-black tracking-[0.2em]">150m</p>
                    </div>
                    <div class="relative">
                        <div class="w-12 h-12 bg-yellow-500 rounded-full pulse-gold flex items-center justify-center shadow-[0_0_40px_rgba(234,179,8,0.6)] border-2 border-yellow-200/40">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Obstacle Warning (Left Side & Smaller) -->
                <div class="absolute bottom-[35%] left-[0%] flex flex-col items-start scale-75 origin-left">
                    <div class="glass-panel p-4 rounded-[2.5rem] border-red-500/50 flex flex-col items-start gap-3 shadow-[0_0_30px_rgba(239,68,68,0.15)]">
                        <div class="flex gap-1.5 items-end h-7">
                            <div class="wave-bar" style="animation-delay: 0.1s; height: 50%"></div>
                            <div class="wave-bar" style="animation-delay: 0.3s; height: 100%"></div>
                            <div class="wave-bar" style="animation-delay: 0.2s; height: 70%"></div>
                        </div>
                        <div class="text-left">
                            <p class="text-red-500 font-black text-lg italic uppercase tracking-tighter">장애물 주의</p>
                            <p class="text-white/70 text-[9px] font-black tracking-tight">170m 전방 공사</p>
                        </div>
                    </div>
                </div>

                <!-- User Current Position Marker -->
                <div class="absolute bottom-[8%] left-1/2 -translate-x-1/2 flex flex-col items-center">
                    <div class="relative">
                        <div class="w-24 h-24 bg-blue-500/10 rounded-full flex items-center justify-center border-2 border-blue-400/30 shadow-[0_0_60px_rgba(59,130,246,0.4)]">
                            <div class="w-12 h-12 bg-blue-600 shadow-[0_10px_30px_rgba(37,99,235,0.7)] rounded-3xl transform rotate-45 flex items-center justify-center border-2 border-blue-300/40">
                                 <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                            </div>
                        </div>
                        <div class="absolute inset-0 border-4 border-blue-400/20 rounded-full animate-ping" style="animation-duration: 4s"></div>
                    </div>
                    <div class="w-4 h-4 bg-yellow-400 rounded-full mt-6 shadow-[0_0_20px_#fbbf24] animate-bounce"></div>
                </div>
            </div>

            <!-- Footer Dock Navigation -->
            <div class="glass-panel rounded-[3.5rem] p-4 flex justify-between items-center pointer-events-auto shadow-2xl border-white/20 mb-6 mx-2">
                <button class="flex flex-col items-center justify-center w-1/4 py-3 text-white/30 active:scale-75 transition-transform group">
                    <div class="p-3 rounded-full mb-1 group-hover:bg-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest opacity-50">Voice</span>
                </button>
                
                <button class="flex flex-col items-center justify-center w-2/4 py-3 text-blue-400 active:scale-95 transition-transform">
                    <div class="bg-blue-600 shadow-[0_15px_35px_rgba(37,99,235,0.6)] p-5 rounded-[2.5rem] -mt-20 mb-2 border-2 border-blue-400/40 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="relative z-10"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-[0.3em] text-blue-300 drop-shadow-lg">Explore Area</span>
                </button>

                <button class="flex flex-col items-center justify-center w-1/4 py-3 text-white/30 active:scale-75 transition-transform group">
                    <div class="p-3 rounded-full mb-1 group-hover:bg-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest opacity-50">Saved</span>
                </button>
            </div>

            <!-- Home Bar Indicator -->
            <div class="w-36 h-1.5 bg-white/25 rounded-full self-center mb-2 shadow-inner"></div>
        </div>

        <!-- System HUD Badge -->
        <div id="sim-badge" class="fixed top-12 left-10 z-50 glass-panel px-4 py-2 rounded-full border-blue-500/50 text-blue-400 text-[9px] font-black tracking-[0.4em] hidden flex items-center gap-3 shadow-2xl animate-pulse">
            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
            SIM-ACTIVE
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key Placeholder

        // Global handler for Google Maps Auth Failure (ApiProjectMapError)
        window.gm_authFailure = function() {
            console.warn("Google Maps Auth Error. Removing error overlays and enabling Digital Twin Simulation.");
            const app = document.getElementById('app');
            app.classList.add('auth-error');
            document.getElementById('sim-badge').classList.remove('hidden');
        };

        function initMap() {
            const center = { lat: 37.5665, lng: 126.9780 };
            try {
                const map = new google.maps.Map(document.getElementById("map"), {
                    zoom: 20,
                    center: center,
                    tilt: 45,
                    heading: 0,
                    disableDefaultUI: true,
                    gestureHandling: "none",
                    styles: [
                        { "elementType": "geometry", "stylers": [{ "color": "#020617" }] },
                        { "elementType": "labels.text.fill", "stylers": [{ "color": "#475569" }] },
                        { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
                        { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#020617" }] }
                    ]
                });

                // Smooth map rotation animation
                let h = 0;
                setInterval(() => {
                    h = (h + 0.1) % 360;
                    map.setHeading(h);
                }, 50);

            } catch (e) {
                gm_authFailure();
            }
        }

        const loadGoogleMaps = async (retryCount = 0) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            if (retryCount >= 2) {
                gm_authFailure();
                return;
            }

            const script = document.createElement("script");
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap&v=weekly`;
            script.async = true;
            script.defer = true;
            
            script.onerror = () => {
                setTimeout(() => loadGoogleMaps(retryCount + 1), delays[retryCount]);
            };

            document.head.appendChild(script);
        };

        // Fail-safe: Switch to simulation mode if Google fails to load within 4 seconds
        setTimeout(() => {
            if (typeof google === 'undefined') gm_authFailure();
        }, 4000);

        window.onload = loadGoogleMaps;
    </script>
</body>
</html>
